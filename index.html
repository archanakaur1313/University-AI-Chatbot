<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoMechanic AI Chatbot</title>
    <!-- Modern Font Option -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="bot-info">
                <div class="bot-avatar">
                   <!-- Wrench/Mechanic SVG Icon -->
                   <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                </div>
                <div class="bot-name">
                    <h1>AutoMechanic AI</h1>
                    <span class="status-indicator"></span><span class="status-text">In the Garage</span>
                </div>
            </div>
        </div>

        <div id="chat-box" class="chat-box">
            <!-- Messages go here -->
        </div>
        
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask about your engine, oil, or brakes..." onkeypress="handleKeyPress(event)" autocomplete="off">
            <button onclick="sendMessage()" aria-label="Send Message">
                <!-- Send Arrow -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
